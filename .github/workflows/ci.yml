name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ---------- BACKEND ----------
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      # ---------- FRONTEND ----------
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
